Project:
  Name: VMF_v1_0
  Version: 1.0.0
  Framework: VMF
  BuildVersion: 1.0.2
  Status: Released

Policy:
  BuildSpecification: Frozen
  VMFSpecification: Frozen
  BuildCandidates: BuildCandidates_v1.1.md
  VMFCandidates: VMFCandidates_v1.1.md

Layers:
  - Common
  - Core
  - Domain
  - Application
  - Infrastructure
  - Presentation

Modules:

  Common:
    StandardModules:
      - Com_Facade
      - ComError

    Classes:
      - Com_Result
      - Com_ErrorInfo
      - Com_CompositionRoot

  Core:
    Status: NotImplemented
    GenerateCommand: None
    Classes: []

  Domain:
    Classes:
      - Dom_DateID
      - Dom_ClassHour
      - Dom_ClassHourID
      - Dom_ClassHourValue
      - Dom_SubjectName
      - Dom_Grade

    Enums: []

  Application:
    Classes:
      - App_Facade
      - App_ProjectService
      - App_ProjectRequest
      - App_ProjectResult

  Infrastructure:
    Classes:
      - Infra_FileRepository
      - Infra_ConfigRepository
      - Infra_LogRepository

  Presentation:
    Classes:
      - Pre_MainPresenter
      - Pre_MainViewContract
      - Pre_MessageService

Generation:

  Common: true
  Core: false
  Domain: true
  Application: true
  Infrastructure: true
  Presentation: true

ReleaseGate:

  Generate:
    - Common
    - Domain
    - Application
    - Infrastructure
    - Presentation

  Verify:
    - ManifestMatched
    - BlueprintMatched
    - CompileSucceeded
    - RuntimeErrorNone

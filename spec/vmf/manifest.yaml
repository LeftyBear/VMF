Project:
  Name: VMF_v1_0
  Version: 1.0.0
  Framework: VMF
  BuildVersion: 1.0.1
  Status: ReleaseCandidate

Policy:
  BuildSpecification: Frozen
  VMFSpecification: Frozen
  BuildCandidates: BuildCandidates_v1.1.md
  VMFCandidates: VMFCandidates_v1.1.md

Layers:
  - Common
  - Core
  - Domain
  - Application
  - Infrastructure
  - Presentation

Modules:
  Common:
    Classes:
      - Com_Result
      - Com_ErrorInfo
      - Com_Facade
      - Com_CompositionRoot
    Enums:
      - Com_Severity
    StandardModules:
      - ComContract
      - ComGuard
      - ComError

  Core:
    Classes:
      - Core_AppContext
      - Core_Config
      - Core_Clock
      - Core_Logger
      - Core_FilePath
      - Core_Validator

  Domain:
    Classes:
      - Dom_DateID
      - Dom_ClassHour
      - Dom_ClassHourID
      - Dom_ClassHourValue
      - Dom_SubjectName
      - Dom_Grade
    Enums:
      - Dom_ClassHourType

  Application:
    Classes:
      - App_Facade
      - App_ProjectService
      - App_ProjectRequest
      - App_ProjectResult

  Infrastructure:
    Classes:
      - Infra_FileRepository
      - Infra_ConfigRepository
      - Infra_LogRepository

  Presentation:
    Classes:
      - Pre_MainPresenter
      - Pre_MainViewContract
      - Pre_MessageService

GenerationOrder:
  - Generate Project
  - Generate Common
  - Generate Core
  - Generate Domain
  - Generate Application
  - Generate Infrastructure
  - Generate Presentation

ReleaseGate:
  - Project generated
  - Common generated
  - Core generated
  - Domain generated
  - Application generated
  - Infrastructure generated
  - Presentation generated
  - Manifest matched
  - Blueprint matched
  - BuildCanon complied
  - DocumentationStandard complied
  - QualityStandard complied
  - Compile succeeded
  - Runtime error none
